version: "3.8"

# =============================================================================
# 개발 서버 환경용 Docker Compose 설정 (Profile: dev)
# =============================================================================
# 사용법: docker-compose -f docker-compose-dev.yml --env-file .env.dev up -d
# 중간 수준의 리소스 할당 (팀 테스트 및 검증용)
# =============================================================================

services:
  devnogi-gateway-dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${DOCKER_USERNAME}/${DOCKER_REPO}:${DOCKER_IMAGE_TAG:-latest}
    container_name: devnogi-gateway-app-dev
    ports:
      - "${SERVER_PORT}:${SERVER_PORT}"
    env_file:
      - .env.dev  # 개발 환경 변수 파일 (JWT, 서비스 URL 등 민감 정보)

    labels:
      autoheal: "true"
    environment:
      # === Application Configuration ===
      SPRING_PROFILES_ACTIVE: dev
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      SERVER_PORT: ${SERVER_PORT}

      # === JWT Configuration ===
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ISSUER: ${JWT_ISSUER}

      # === Service Discovery URLs ===
      AUTH_SERVER_URL: ${AUTH_SERVER_URL}
      OPEN_API_BATCH_SERVER_URL: ${OPEN_API_BATCH_SERVER_URL}
      COMMUNITY_SERVER_URL: ${COMMUNITY_SERVER_URL}
      TECH_BLOG_SERVER_URL: ${TECH_BLOG_SERVER_URL}

      # === CORS Configuration ===
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      CORS_ALLOWED_HEADERS: ${CORS_ALLOWED_HEADERS:-*}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-true}

      # === Logging Configuration ===
      LOG_LEVEL_ROOT: ${LOG_LEVEL_ROOT:-INFO}
      LOG_LEVEL_GATEWAY: ${LOG_LEVEL_GATEWAY:-DEBUG}
      LOG_LEVEL_NETTY: ${LOG_LEVEL_NETTY:-DEBUG}

      # === Docker Configuration ===
      DOCKER_USERNAME: ${DOCKER_USERNAME}
      DOCKER_REPO: ${DOCKER_REPO}

      # === JVM Configuration (Dev - 중간 리소스) ===
      # Heap: 256m~512m, Non-Heap: ~262m, Total: ~774m
      JAVA_OPTS: >-
        -Xms${JAVA_OPTS_XMS:-256m}
        -Xmx${JAVA_OPTS_XMX:-512m}
        -XX:MaxMetaspaceSize=${JAVA_OPTS_MAX_METASPACE_SIZE:-150m}
        -XX:ReservedCodeCacheSize=${JAVA_OPTS_RESERVED_CODE_CACHE_SIZE:-48m}
        -XX:MaxDirectMemorySize=${JAVA_OPTS_MAX_DIRECT_MEMORY_SIZE:-64m}
        -Xss${JAVA_OPTS_XSS:-512k}
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=${JAVA_OPTS_MAX_GC_PAUSE_MILLIS:-200}
        -XX:G1HeapRegionSize=${JAVA_OPTS_G1_HEAP_REGION_SIZE:-2m}
        -XX:InitiatingHeapOccupancyPercent=${JAVA_OPTS_INITIATING_HEAP_OCCUPANCY_PERCENT:-45}
        -XX:+TieredCompilation
        -XX:TieredStopAtLevel=${JAVA_OPTS_TIERED_STOP_AT_LEVEL:-2}
        -XX:CICompilerCount=${JAVA_OPTS_CI_COMPILER_COUNT:-2}
        -XX:+UseCompressedOops
        -XX:+UseCompressedClassPointers
        -Djava.security.egd=file:/dev/./urandom
        -Dspring.jmx.enabled=false
    volumes:
      - app-logs:/app/logs
    restart: on-failure:5

    # === Docker Resource Limits (Dev - 중간) ===
    deploy:
      resources:
        limits:
          memory: 750M
        reservations:
          memory: 512M

    networks:
      - app-network

    # === Health Check (Dev - 표준) ===
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${SERVER_PORT}/actuator/health"]
      interval: 30s
      timeout: 15s
      retries: 4
      start_period: 120s

    # === Logging (Dev - 표준) ===
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # === Autoheal (Dev - 표준) ===
  autoheal:
    image: willfarrell/autoheal:latest
    container_name: devnogi-gateway-autoheal-dev
    restart: unless-stopped
    environment:
      AUTOHEAL_INTERVAL: 30        # 체크 주기 (초)
      AUTOHEAL_START_PERIOD: 0     # 시작 유예 시간
      AUTOHEAL_DEFAULT_STOP_TIMEOUT: 15  # graceful shutdown 대기 시간 (초)
      DOCKER_SOCK: /var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 50M
        reservations:
          memory: 20M

volumes:
  app-logs:
    driver: local

networks:
  app-network:
    driver: bridge
