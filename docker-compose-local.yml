version: "3.8"

# 로컬 개발 환경용 Docker Compose 설정
# 사용법: docker-compose -f docker-compose-local.yml --env-file .env.local up --build
# 참고: 쉘 환경 변수가 .env.local 파일의 값을 오버라이드할 수 있으므로 --env-file 옵션을 명시하는 것이 좋습니다

services:
  gateway-app:
    build:
      context: .
      dockerfile: Dockerfile
    # 로컬 이미지 이름 (Docker Hub에 push하지 않음)
    image: devnogi-gateway-server:local
    container_name: gateway-app-local
    ports:
      - "${SERVER_PORT:-8099}:${SERVER_PORT:-8099}"
    env_file:
      - .env.local  # 로컬 환경 변수 파일
    labels:
      autoheal: "true"
    environment:
      # === Application Configuration ===
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      SERVER_PORT: ${SERVER_PORT:-8099}

      # === Downstream Service URLs (로컬 개발 시 호스트의 다른 서비스 연결) ===
      AUTH_SERVER_URL: ${AUTH_SERVER_URL:-http://host.docker.internal:8091}
      OPEN_API_BATCH_SERVER_URL: ${OPEN_API_BATCH_SERVER_URL:-http://host.docker.internal:8092}
      COMMUNITY_SERVER_URL: ${COMMUNITY_SERVER_URL:-http://host.docker.internal:8093}

      # === Security Configuration ===
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-e4f1a5c8d2b7e9f0a6c3d1b8e5f2c7a9d4e6f3b1a2c8d5e9f0b3a7c2d1e8f5a4}
      JWT_ISSUER: ${JWT_ISSUER:-devnogi}

      # === CORS Configuration ===
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}

      # === JVM Configuration (로컬 개발용 - 메모리 사용량 감소) ===
      JAVA_OPTS: >-
        -Xms${JAVA_OPTS_XMS:-128m}
        -Xmx${JAVA_OPTS_XMX:-256m}
        -XX:MaxMetaspaceSize=${JAVA_OPTS_MAX_METASPACE_SIZE:-128m}
        -XX:ReservedCodeCacheSize=${JAVA_OPTS_RESERVED_CODE_CACHE_SIZE:-32m}
        -XX:MaxDirectMemorySize=${JAVA_OPTS_MAX_DIRECT_MEMORY_SIZE:-32m}
        -Xss${JAVA_OPTS_XSS:-512k}
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=${JAVA_OPTS_MAX_GC_PAUSE_MILLIS:-200}
        -XX:G1HeapRegionSize=${JAVA_OPTS_G1_HEAP_REGION_SIZE:-1m}
        -XX:InitiatingHeapOccupancyPercent=${JAVA_OPTS_INITIATING_HEAP_OCCUPANCY_PERCENT:-45}
        -XX:+TieredCompilation
        -XX:TieredStopAtLevel=${JAVA_OPTS_TIERED_STOP_AT_LEVEL:-1}
        -XX:CICompilerCount=${JAVA_OPTS_CI_COMPILER_COUNT:-2}
        -XX:+UseCompressedOops
        -XX:+UseCompressedClassPointers
        -Djava.security.egd=file:/dev/./urandom
        -Dspring.jmx.enabled=false
    volumes:
      - gateway-logs:/app/logs  # Named volume 사용 (권한 문제 해결)
    restart: on-failure:${RESTART_POLICY_MAX_RETRIES:-3}

    # 로컬 개발용 리소스 제한 (더 적은 리소스)
    deploy:
      resources:
        limits:
          memory: ${DOCKER_MEMORY_LIMIT:-512m}
        reservations:
          memory: ${DOCKER_MEMORY_RESERVATION:-256m}

    networks:
      - gateway-network

    # Health Check
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${SERVER_PORT:-8099}/actuator/health"]
      interval: ${HEALTHCHECK_INTERVAL:-30s}
      timeout: ${HEALTHCHECK_TIMEOUT:-10s}
      retries: ${HEALTHCHECK_RETRIES:-3}
      start_period: ${HEALTHCHECK_START_PERIOD:-60s}

    logging:
      driver: "json-file"
      options:
        max-size: ${LOGGING_MAX_SIZE:-10m}
        max-file: "${LOGGING_MAX_FILE:-3}"

  # Autoheal: unhealthy 컨테이너 자동 재시작
  autoheal:
    image: willfarrell/autoheal:latest
    container_name: autoheal-gateway-local
    restart: unless-stopped
    environment:
      AUTOHEAL_INTERVAL: ${AUTOHEAL_INTERVAL:-30}
      AUTOHEAL_START_PERIOD: ${AUTOHEAL_START_PERIOD:-0}
      AUTOHEAL_DEFAULT_STOP_TIMEOUT: ${AUTOHEAL_DEFAULT_STOP_TIMEOUT:-10}
      DOCKER_SOCK: /var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - gateway-network
    deploy:
      resources:
        limits:
          memory: ${AUTOHEAL_MEMORY_LIMIT:-50m}
        reservations:
          memory: ${AUTOHEAL_MEMORY_RESERVATION:-20m}

volumes:
  gateway-logs:
    driver: local

networks:
  gateway-network:
    driver: bridge
