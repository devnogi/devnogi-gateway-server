version: "3.8"

# =============================================================================
# 로컬 개발 환경용 Docker Compose 설정 (Profile: local)
# =============================================================================
# 사용법: docker-compose -f docker-compose-local.yml --env-file .env.local up -d --build
# 참고: 쉘 환경 변수가 .env.local 파일의 값을 오버라이드할 수 있으므로 --env-file 옵션을 명시하는 것이 좋습니다
# =============================================================================

services:
  spring-app:
    build:
      context: .
      dockerfile: Dockerfile
    # 로컬 이미지 이름 (Docker Hub에 push하지 않음)
    image: devnogi-gateway-server:local
    container_name: devnogi-gateway-app-local
    ports:
      - "${SERVER_PORT:-8090}:${SERVER_PORT:-8090}"
    env_file:
      - .env.local  # 로컬 환경 변수 파일 (JWT, 서비스 URL 등 민감 정보)
    labels:
      autoheal: "true"
    environment:
      # === Application Configuration ===
      SPRING_PROFILES_ACTIVE: local
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      SERVER_PORT: ${SERVER_PORT:-8090}

      # === JWT Configuration ===
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-local-dev-secret-key-change-in-production}
      JWT_ISSUER: ${JWT_ISSUER:-devnogi}

      # === Service Discovery URLs ===
      AUTH_SERVER_URL: ${AUTH_SERVER_URL:-http://host.docker.internal:8091}
      OPEN_API_BATCH_SERVER_URL: ${OPEN_API_BATCH_SERVER_URL:-http://host.docker.internal:8093}
      COMMUNITY_SERVER_URL: ${COMMUNITY_SERVER_URL:-http://host.docker.internal:8092}
      TECH_BLOG_SERVER_URL: ${TECH_BLOG_SERVER_URL:-http://host.docker.internal:8094}

      # === CORS Configuration ===
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      CORS_ALLOWED_HEADERS: ${CORS_ALLOWED_HEADERS:-*}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-true}

      # === Logging Configuration ===
      LOG_LEVEL_ROOT: ${LOG_LEVEL_ROOT:-INFO}
      LOG_LEVEL_GATEWAY: ${LOG_LEVEL_GATEWAY:-DEBUG}
      LOG_LEVEL_NETTY: ${LOG_LEVEL_NETTY:-DEBUG}

      # === JVM Configuration (Local - 경량 개발용) ===
      # Heap: 256m~512m, Non-Heap: ~256m, Total: ~768m
      JAVA_OPTS: >-
        -Xms${JAVA_OPTS_XMS:-256m}
        -Xmx${JAVA_OPTS_XMX:-512m}
        -XX:MaxMetaspaceSize=${JAVA_OPTS_MAX_METASPACE_SIZE:-150m}
        -XX:ReservedCodeCacheSize=${JAVA_OPTS_RESERVED_CODE_CACHE_SIZE:-48m}
        -XX:MaxDirectMemorySize=${JAVA_OPTS_MAX_DIRECT_MEMORY_SIZE:-64m}
        -Xss${JAVA_OPTS_XSS:-512k}
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=${JAVA_OPTS_MAX_GC_PAUSE_MILLIS:-400}
        -XX:G1HeapRegionSize=${JAVA_OPTS_G1_HEAP_REGION_SIZE:-2m}
        -XX:InitiatingHeapOccupancyPercent=${JAVA_OPTS_INITIATING_HEAP_OCCUPANCY_PERCENT:-45}
        -XX:+TieredCompilation
        -XX:TieredStopAtLevel=${JAVA_OPTS_TIERED_STOP_AT_LEVEL:-2}
        -XX:CICompilerCount=${JAVA_OPTS_CI_COMPILER_COUNT:-2}
        -XX:+UseCompressedOops
        -XX:+UseCompressedClassPointers
        -Djava.security.egd=file:/dev/./urandom
        -Dspring.jmx.enabled=false
    volumes:
      - app-logs:/app/logs
      # 로컬 개발 시 설정 파일 마운트 (선택사항)
      # - ./config:/app/config:ro
    restart: on-failure:3

    # === Docker Resource Limits (Local - 경량) ===
    deploy:
      resources:
        limits:
          memory: 768m
        reservations:
          memory: 384m

    networks:
      - app-network

    # === Health Check (Local - 표준) ===
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${SERVER_PORT:-8090}/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    # === Logging (Local - 최소) ===
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # === Autoheal (Local - 표준) ===
  # unhealthy 컨테이너 자동 재시작 서비스
  autoheal:
    image: willfarrell/autoheal:latest
    container_name: devnogi-gateway-autoheal-local
    restart: unless-stopped
    environment:
      AUTOHEAL_INTERVAL: 30        # 체크 주기 (초)
      AUTOHEAL_START_PERIOD: 0     # 시작 유예 시간 (healthcheck start_period를 따름)
      AUTOHEAL_DEFAULT_STOP_TIMEOUT: 10  # graceful shutdown 대기 시간 (초)
      DOCKER_SOCK: /var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 50m
        reservations:
          memory: 20m

volumes:
  app-logs:
    driver: local

networks:
  app-network:
    driver: bridge
