server:
  port: 8099

spring:
  application:
    name: gateway-server

  cloud:
    gateway:
      # CORS 전역 설정
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - "https://www.memonogi.com"
              - "https://memonogi.com"
              - "http://localhost:*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      routes:
        # Auth Server - 인증 불필요 경로 (로그인, 토큰 갱신 등)
        - id: devnogi-auth-server-public
          uri: ${AUTH_SERVER_URL:http://localhost:8091}
          predicates:
            - Path=/das/api/auth/login,/das/api/auth/refresh,/das/api/auth/register,/das/api/auth/logout
          filters:
            - StripPrefix=1

        # Auth Server - OAuth2 인가 시작 (JWT 불필요)
        - id: devnogi-auth-server-oauth-start
          uri: ${AUTH_SERVER_URL:http://localhost:8091}
          predicates:
            - Path=/das/oauth2/authorization/**
          filters:
            - StripPrefix=1

        # Auth Server - 인증/인가 담당 (JWT 필요)
        - id: devnogi-auth-server
          uri: ${AUTH_SERVER_URL:http://localhost:8091}
          predicates:
            - Path=/das/**
          filters:
            - StripPrefix=1
            - name: JwtAuthentication
              args:
                secretKey: ${JWT_SECRET_KEY}
                issuer: ${JWT_ISSUER}

        # Auth Server - OAuth2 콜백 (JWT 불필요)
        - id: devnogi-auth-server-oauth
          uri: ${AUTH_SERVER_URL:http://localhost:8091}
          predicates:
            - Path=/login/oauth2/code/**

        # Open API Batch Server - 경매 데이터 수집/분석
        - id: open-api-batch-server
          uri: ${OPEN_API_BATCH_SERVER_URL:http://localhost:8092}
          predicates:
            - Path=/oab/**
          filters:
            - StripPrefix=1
            - name: JwtAuthentication
              args:
                secretKey: ${JWT_SECRET_KEY}
                issuer: ${JWT_ISSUER}

        # Community Server - 게시판/댓글/사용자 관리
        - id: devnogi-community-server
          uri: ${COMMUNITY_SERVER_URL:http://localhost:8093}
          predicates:
            - Path=/dcs/**
          filters:
            - StripPrefix=1
            - name: JwtAuthentication
              args:
                secretKey: ${JWT_SECRET_KEY}
                issuer: ${JWT_ISSUER}

management:
  endpoints:
    web:
      exposure:
        include: "*"

jwt:
  secret-key: ${JWT_SECRET_KEY}
  issuer: ${JWT_ISSUER}

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG
    reactor.netty.http.client: DEBUG
